<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILLAGE - Tienda de Decants</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C9A84C;
      --dark: #0D0D0D;
      --dark2: #1A1A1A;
      --text: #F5F0E8;
      --text-muted: #9A9080;
      --border: rgba(201,168,76,0.25);
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
    }

    /* NAVEGACIÓN */
    .nav {
      background: rgba(13,13,13,0.95);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .nav-actions {
      display: flex;
      gap: 1rem;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .nav-btn:hover {
      color: var(--gold);
    }

    .cart-badge {
      background: var(--gold);
      color: var(--dark);
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
    }

    /* CONTENEDOR */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 2rem;
    }

    /* GRID DE PRODUCTOS */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: var(--dark2);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      transition: border-color 0.2s;
    }

    .product-card:hover {
      border-color: var(--gold);
    }

    .product-thumb {
      background: var(--dark);
      height: 120px;
      border-radius: 4px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: rgba(201,168,76,0.3);
    }

    .product-house {
      font-size: 10px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-notes {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .product-sizes {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .size-btn {
      border: 0.5px solid var(--border);
      background: none;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .size-btn.active,
    .size-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.1);
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-price {
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
    }

    .add-btn {
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .add-btn:hover {
      opacity: 0.85;
    }

    /* CARRITO LATERAL */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 199;
      display: none;
    }

    .overlay.open {
      display: block;
    }

    .cart-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: var(--dark2);
      border-left: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 200;
    }

    .cart-panel.open {
      transform: translateX(0);
    }

    .cart-header {
      padding: 1rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-title {
      font-size: 18px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
    }

    .cart-item {
      padding: 1rem 0;
      border-bottom: 0.5px solid rgba(201,168,76,0.1);
      display: flex;
      gap: 10px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .cart-item-size {
      font-size: 12px;
      color: var(--text-muted);
    }

    .cart-item-price {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }

    .cart-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
    }

    .cart-empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .cart-footer {
      padding: 1.25rem;
      border-top: 0.5px solid var(--border);
      display: none;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 16px;
      font-weight: 600;
    }

    .cart-total-amount {
      color: var(--gold);
    }

    .checkout-btn {
      width: 100%;
      padding: 10px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }

    .checkout-btn:hover {
      opacity: 0.85;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--dark2);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      width: 300px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      background: var(--dark);
      border: 0.5px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .success-msg {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 12px;
      display: none;
    }

    .success-msg.show {
      display: block;
    }

    .demo-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- NAVEGACIÓN -->
  <nav class="nav">
    <div class="nav-logo">SILLAGE</div>
    <div class="nav-actions">
      <button class="nav-btn" id="loginBtn">Iniciar sesión</button>
      <button class="nav-btn" id="cartBtn">
        Carrito
        <span class="cart-badge" id="cartCount">0</span>
      </button>
    </div>
  </nav>

  <!-- PRINCIPAL -->
  <div class="container">
    <h1>Catálogo de Decants</h1>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- CARRITO -->
  <div class="overlay" id="overlay"></div>
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <span class="cart-title">Tu selección</span>
      <button class="close-btn" id="closeCartBtn">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter">
      <div class="cart-total">
        <span>Total:</span>
        <span class="cart-total-amount" id="cartTotal">$0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">Proceder al pago</button>
    </div>
  </aside>

  <!-- MODAL LOGIN -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Bienvenido</span>
        <button class="close-btn" id="closeLoginBtn">×</button>
      </div>
      
      <div class="success-msg" id="successMsg"></div>
      
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Correo</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="tu@correo.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="checkout-btn">Entrar</button>
      </form>
      
      <div class="demo-note">Para demo, cualquier email y contraseña funciona</div>
    </div>
  </div>

  <script>
    // ============================================================
    // DATOS DE PRODUCTOS
    // ============================================================

    const products = [
      { id: 1, house: 'Creed', name: 'Aventus', notes: 'Piña · Abedul · Musgo', prices: { 2: 120, 5: 250, 10: 420 } },
      { id: 2, house: 'Tom Ford', name: 'Oud Wood', notes: 'Oud · Sándalo · Vainilla', prices: { 2: 110, 5: 230, 10: 390 } },
      { id: 3, house: 'Maison Margiela', name: 'Jazz Club', notes: 'Ron · Tabaco · Vainilla', prices: { 2: 90, 5: 190, 10: 320 } },
      { id: 4, house: 'Dior', name: 'Sauvage Elixir', notes: 'Canela · Lavanda · Ámbar', prices: { 2: 85, 5: 175, 10: 295 } },
      { id: 5, house: 'Byredo', name: 'Bal d\'Afrique', notes: 'Neroli · Violeta · Musco', prices: { 2: 100, 5: 210, 10: 355 } },
      { id: 6, house: 'Acqua di Parma', name: 'Colonia', notes: 'Limón · Bergamota · Verbena', prices: { 2: 75, 5: 155, 10: 260 } },
    ];

    // Estado
    let state = {
      cart: [],
      selectedSizes: {},
      isLoggedIn: false,
      csrfToken: null
    };

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      fetchCSRFToken();
      renderProducts();
      setupEventListeners();
      updateCart();
    });

    function setupEventListeners() {
      document.getElementById('loginBtn').addEventListener('click', openLoginModal);
      document.getElementById('closeLoginBtn').addEventListener('click', closeLoginModal);
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('cartBtn').addEventListener('click', toggleCart);
      document.getElementById('closeCartBtn').addEventListener('click', toggleCart);
      document.getElementById('overlay').addEventListener('click', toggleCart);
      document.getElementById('checkoutBtn').addEventListener('click', handleCheckout);
    }

    // ============================================================
    // PRODUCTOS
    // ============================================================

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => {
        const sz = state.selectedSizes[p.id] || 5;
        return `
          <div class="product-card">
            <div class="product-thumb">${p.name.charAt(0)}</div>
            <div class="product-house">${p.house}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-notes">${p.notes}</div>
            <div class="product-sizes">
              ${[2, 5, 10].map(s => `
                <button 
                  class="size-btn ${state.selectedSizes[p.id] === s || (s === 5 && !state.selectedSizes[p.id]) ? 'active' : ''}"
                  onclick="selectSize(${p.id}, ${s})"
                >${s}ml</button>
              `).join('')}
            </div>
            <div class="product-footer">
              <span class="product-price">$${p.prices[sz]}</span>
              <button class="add-btn" onclick="addToCart(${p.id})">+ Agregar</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectSize(id, size) {
      state.selectedSizes[id] = size;
      renderProducts();
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const size = state.selectedSizes[id] || 5;
      
      const existing = state.cart.find(item => item.id === id && item.size === size);
      if (existing) {
        existing.qty++;
      } else {
        state.cart.push({ id, size, qty: 1 });
      }
      
      updateCart();
      alert(product.name + ' agregado al carrito');
    }

    // ============================================================
    // CARRITO
    // ============================================================

    function updateCart() {
      const count = state.cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = count;
      
      const itemsEl = document.getElementById('cartItems');
      const footerEl = document.getElementById('cartFooter');
      
      if (state.cart.length === 0) {
        itemsEl.innerHTML = '<div class="cart-empty">Tu carrito está vacío</div>';
        footerEl.style.display = 'none';
      } else {
        let total = 0;
        itemsEl.innerHTML = state.cart.map(item => {
          const product = products.find(p => p.id === item.id);
          const subtotal = product.prices[item.size] * item.qty;
          total += subtotal;
          
          return `
            <div class="cart-item">
              <div class="cart-item-info">
                <div class="cart-item-name">${product.name}</div>
                <div class="cart-item-size">${item.size}ml × ${item.qty}</div>
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span class="cart-item-price">$${subtotal}</span>
                <button class="cart-remove" onclick="removeFromCart(${item.id}, ${item.size})">×</button>
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('cartTotal').textContent = '$' + total;
        footerEl.style.display = 'block';
      }
    }

    function removeFromCart(id, size) {
      state.cart = state.cart.filter(item => !(item.id === id && item.size === size));
      updateCart();
    }

    function toggleCart() {
      document.getElementById('cartPanel').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }

    // ============================================================
    // AUTENTICACIÓN
    // ============================================================

    function openLoginModal() {
      document.getElementById('loginModal').classList.add('open');
    }

    function closeLoginModal() {
      document.getElementById('loginModal').classList.remove('open');
      document.getElementById('loginForm').reset();
      document.getElementById('successMsg').classList.remove('show');
    }

    async function fetchCSRFToken() {
      try {
        const response = await fetch('http://localhost:3001/api/csrf-token');
        const data = await response.json();
        state.csrfToken = data.token;
      } catch (err) {
        console.error('Error fetching CSRF token:', err);
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      if (!email || !password) {
        alert('Rellena todos los campos');
        return;
      }

      try {
        const response = await fetch('http://localhost:3001/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': state.csrfToken
          },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          alert('Error en login');
          return;
        }

        state.isLoggedIn = true;
        document.getElementById('successMsg').textContent = 'Sesión iniciada ✓';
        document.getElementById('successMsg').classList.add('show');
        
        setTimeout(() => {
          closeLoginModal();
        }, 1500);

      } catch (err) {
        alert('Error de conexión con servidor');
        console.error('Login error:', err);
      }
    }

    // ============================================================
    // CHECKOUT
    // ============================================================

    async function handleCheckout() {
      if (!state.isLoggedIn) {
        alert('Debes iniciar sesión primero');
        openLoginModal();
        return;
      }

      if (state.cart.length === 0) {
        alert('El carrito está vacío');
        return;
      }

      const total = state.cart.reduce((sum, item) => {
        const product = products.find(p => p.id === item.id);
        return sum + (product.prices[item.size] * item.qty);
      }, 0);

      try {
        const response = await fetch('http://localhost:3001/api/orders/checkout', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': state.csrfToken
          },
          credentials: 'include',
          body: JSON.stringify({ items: state.cart, total })
        });

        if (!response.ok) {
          alert('Error en checkout');
          return;
        }

        const data = await response.json();
        alert('¡Orden creada! ID: ' + data.orderId);
        state.cart = [];
        updateCart();
        toggleCart();

      } catch (err) {
        alert('Error');
        console.error('Checkout error:', err);
      }
    }
  </script>
</body>
</html>
